<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="main.css">
    <title>HikeVerse Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f7fa;
        }

        nav{
            background:#2c3e50;
            color:white;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            color:#2ecc71;
        }

        .container{
            text-align:center;
            margin-top:80px;
        }

        .container h1{
            margin-bottom:30px;
        }

        .btn{
            padding:15px 30px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            margin:10px;
            font-size:16px;
        }

        .add-btn{
            background:#2ecc71;
            color:white;
        }

        .view-btn{
            background:#3498db;
            color:white;
        }

        .logout-btn{
            background:#e74c3c;
            color:white;
        }

    </style>

</head>

<body>

    <nav class="navbar">
        <h2>🏔️ HikeVerse</h2>

        <button class="btn btn-red" onclick="logout()">
            Logout
        </button>
    </nav>

    <div style="text-align:center;padding:60px 20px;">

        <h1 id="welcome"></h1>

        <p style="margin-top:15px;font-size:18px;color:#555;">
            Discover, Plan and Track the Best Treks in Maharashtra
        </p>

        <div style="margin-top:40px;">

            <a href="add-trek.html">
                <button class="btn btn-green">
                    Add Trek
                </button>
            </a>

            <a href="treks.html">
                <button class="btn btn-blue">
                    Explore Treks
                </button>
            </a>

            <a href="favorites.html">
                <button class="btn btn-green">
                    My Favorites ❤️
                </button>
            </a>

        </div>

    </div>

    <div style="
        display:flex;
        justify-content:center;
        gap:30px;
        flex-wrap:wrap;
        padding:30px;
    ">

       <div style="
    background:white;
    padding:25px;
    width:250px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
">
    <h2 id="totalTreks">🏔️ Total Treks: 0</h2>
</div>

<div style="
    background:white;
    padding:25px;
    width:250px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
">
    <h2 id="totalFavorites">❤️ Favorites: 0</h2>
</div>

<div style="
    background:white;
    padding:25px;
    width:250px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
">
    <h2 id="totalReviews">⭐ Reviews: 0</h2>
</div>

    </div>
<script src="script.js"></script>
    <script>

        const user = localStorage.getItem("loggedInUser");

        if (!user) {
            window.location.href = "login.html";
        }

        document.getElementById("welcome").innerText =
            "Welcome, " + user + " 👋";

        function logout() {

            localStorage.removeItem("loggedInUser");

            window.location.href = "login.html";

        }
        loadStats();

    </script>

</body>
</html>
