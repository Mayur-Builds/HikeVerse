<html>
<head>
    <title>Edit Trek - HikeVerse</title>
</head>
<body>

    <h1>Edit Trek ✏️</h1>

    <input type="text" id="difficulty" placeholder="Difficulty"><br><br>

    <textarea id="description" placeholder="Description"></textarea><br><br>

    <input type="text" id="imageUrl" placeholder="Image URL"><br><br>


    <input type="text" id="distance" placeholder="Distance">

<input type="text" id="duration" placeholder="Duration">

<textarea id="thingsToCarry" placeholder="Things To Carry"></textarea>

    <button onclick="updateTrek()">Update Trek</button>

        loadEditTrek();
