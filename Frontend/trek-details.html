<!DOCTYPE html>
<html>
<head>
    <title>Trek Details</title>
</head>
<body>

    <h1 id="trekName"></h1>

    <img id="trekImage" width="500">

    <p id="location"></p>

    <p id="difficulty"></p>

    <p id="description"></p>

    <p id="distance"></p>

<p id="duration"></p>

<p id="bestSeason"></p>

<p id="thingsToCarry"></p>

<p id="emergencyContact"></p>

<p>
    <a id="mapLink" target="_blank">
        Open Trek Location 📍
    </a>
</p>

<h2>Current Weather 🌦️</h2>

<p id="temperature"></p>

<p id="windSpeed"></p>

<p id="humidity"></p>

<p id="weatherAdvice"></p>

<h2>Add Review ⭐</h2>

<input type="number" id="rating" placeholder="Rating 1 to 5" min="1" max="5">

<br><br>

<textarea id="comment" placeholder="Write your review"></textarea>

<br><br>

<button onclick="addReview()">Submit Review</button>

<h2>Reviews</h2>

<div id="reviewContainer"></div>



    <button onclick="deleteTrek()">Delete Trek 🗑️</button>
    <button onclick="goToEditTrek()">Edit Trek ✏️</button>
    <button onclick="addToFavorite()">Save to Favorites ❤️</button>

    <script src="script.js"></script>
    <script>
    loadTrekDetails();
</script>

</body>
</html>
