<!DOCTYPE html>
<html>
<head>
    <title>Trek Details - HikeVerse</title>

    <link rel="stylesheet" href="main.css">

    <style>
        .details-container{
            max-width:1000px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.12);
        }

        .details-image{
            width:100%;
            height:420px;
            object-fit:cover;
            border-radius:18px;
            margin-bottom:25px;
        }

        .info-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
            gap:18px;
            margin:25px 0;
        }

        .info-box{
            background:#f4f7fa;
            padding:18px;
            border-radius:14px;
        }

        .section{
            margin-top:35px;
        }

     

        input, textarea{
            width:100%;
            padding:13px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:10px;
        }

        textarea{
            height:100px;
            resize:none;
        }

        .action-buttons{
            margin-top:25px;
            display:flex;
            gap:12px;
            flex-wrap:wrap;
        }
        .weather-card{
    background:#eaf6ff;
    padding:20px;
    border-radius:15px;
    margin-top:15px;
    border-left:5px solid #3498db;
}

.weather-card p{
    margin:8px 0;
    font-size:16px;
}

.review-card{
    background:#fff8e1;
    padding:18px;
    border-radius:15px;
    margin:15px 0;
    border-left:5px solid #f1c40f;
}

.review-card h3{
    color:#f39c12;
    margin-bottom:8px;
    font-size:24px;
}

.review-card p{
    margin-bottom:8px;
    color:#555;
}
    </style>
</head>

<body>

   <nav class="navbar">

    <h2>🏔️ HikeVerse</h2>

    <div>
        <a href="dashboard.html">Dashboard</a>
        <a href="treks.html">Treks</a>
        <a href="favorites.html">Favorites</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>

</nav>

    <div class="details-container">

        <h1 id="trekName"></h1>

        <img id="trekImage" class="details-image">

        <p id="description"></p>

        <div class="info-grid">
            <div class="info-box" id="location"></div>
            <div class="info-box" id="difficulty"></div>
            <div class="info-box" id="distance"></div>
            <div class="info-box" id="duration"></div>
            <div class="info-box" id="bestSeason"></div>
            <div class="info-box" id="emergencyContact"></div>
        </div>

        <div class="section">
            <h2>Things To Carry 🎒</h2>
            <p id="thingsToCarry"></p>
        </div>

        <div class="section">
            <a id="mapLink" target="_blank">
                <button class="btn btn-blue">Open Trek Location 📍</button>
            </a>
        </div>

    <div class="section">
    <h2>Current Weather 🌦️</h2>

    <div class="weather-card">
        <p id="temperature"></p>
        <p id="windSpeed"></p>
        <p id="humidity"></p>
        <p id="weatherAdvice"></p>
    </div>
</div>

        <div class="section">
            <h2 id="averageRating"></h2>
        </div>

        <div class="section">
            <h2>Add Review ⭐</h2>

            <input type="number" id="rating" placeholder="Rating 1 to 5" min="1" max="5">

            <textarea id="comment" placeholder="Write your review"></textarea>

            <button class="btn btn-green" onclick="addReview()">Submit Review</button>
        </div>

        <div class="section">
            <h2>Reviews</h2>
            <div id="reviewContainer"></div>
        </div>

        <div class="action-buttons">
           <button class="admin-only" onclick="deleteTrek()">Delete Trek</button>
            <button class="admin-only" onclick="goToEditTrek()">Edit Trek</button>
            <button class="btn btn-green" onclick="addToFavorite()">Save to Favorites ❤️</button>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        loadTrekDetails();
        checkAdminAccess();
    </script>

<footer>

    <p>🏔️ HikeVerse</p>

    <p>Discover, Plan and Explore Treks Across Maharashtra</p>

    <p>© 2026 HikeVerse | Built by Mayur</p>

</footer>
</body>
</html>
