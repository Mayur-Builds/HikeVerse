<!DOCTYPE html>
<html>
<head>
    <title>Contact HikeVerse</title>

    <link rel="stylesheet" href="main.css">

    <style>

        .contact-container{
            max-width:800px;
            margin:50px auto;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.12);
        }

        .contact-container h1{
            margin-bottom:20px;
        }

        .contact-container p{
            margin:15px 0;
            font-size:18px;
        }

        .contact-form{
            margin-top:30px;
        }

        .contact-form input,
        .contact-form textarea{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:10px;
        }

        .contact-form textarea{
            height:120px;
            resize:none;
        }

    </style>

</head>

<body>

    <nav class="navbar">

        <h2>🏔️ HikeVerse</h2>

        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="treks.html">Treks</a>
            <a href="favorites.html">Favorites</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            
        </div>

    </nav>

    <div class="contact-container">

        <h1>Contact Us</h1>

        <p>📧 Email: support@hikeverse.com</p>

        <p>📞 Phone: +91 9876543210</p>

        <p>📍 Location: Maharashtra, India</p>

        <div class="contact-form">

            <input type="text" placeholder="Your Name">

            <input type="email" placeholder="Your Email">

            <textarea placeholder="Your Message"></textarea>

            <button class="btn btn-green">
                Send Message
            </button>

        </div>

    </div>

    <footer>

    <p>🏔️ HikeVerse</p>

    <p>Discover, Plan and Explore Treks Across Maharashtra</p>

    <p>© 2026 HikeVerse | Built by Mayur</p>

</footer>
</body>
</html>
