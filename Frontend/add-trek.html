<!DOCTYPE html>
<html>
<head>
    <title>Add Trek - HikeVerse</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f7fa;
        }

        nav{
            background:#2c3e50;
            color:white;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            color:#2ecc71;
        }

        nav a{
            color:white;
            text-decoration:none;
        }

        .form-container{
            width:450px;
            background:white;
            margin:60px auto;
            padding:35px;
            border-radius:18px;
            box-shadow:0 8px 25px rgba(0,0,0,0.12);
        }

        .form-container h1{
            text-align:center;
            margin-bottom:25px;
            color:#2c3e50;
        }

        input, textarea{
            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }

        textarea{
            height:120px;
            resize:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2ecc71;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#27ae60;
        }
    </style>
</head>
<body>

    <nav>
        <h2>🏔️ HikeVerse</h2>
        <a href="dashboard.html">Dashboard</a>
    </nav>

    <div class="form-container">

        <h1>Add New Trek</h1>

        <input type="text" id="trekName" placeholder="Trek Name">

        <input type="text" id="location" placeholder="Location">

        <input type="text" id="difficulty" placeholder="Difficulty">

        <textarea id="description" placeholder="Description"></textarea>

        <input type="text" id="imageUrl" placeholder="Image URL">



        <input type="text" id="distance" placeholder="Distance (e.g. 6 KM)">

<input type="text" id="duration" placeholder="Duration (e.g. 4 Hours)">

<input type="text" id="bestSeason" placeholder="Best Season">

<textarea id="thingsToCarry" placeholder="Things To Carry"></textarea>

<input type="text" id="emergencyContact" placeholder="Emergency Contact">

<input type="text" id="mapLink" placeholder="Google Maps Link">

        <button onclick="addTrek()">Add Trek</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
