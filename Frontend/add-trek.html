<!DOCTYPE html>
<html>
<head>

    <title>Add Trek - HikeVerse</title>

    <link rel="stylesheet" href="main.css">

    <style>

        body{
            background:#f4f7fa;
        }

        nav{
            background:#2c3e50;
            color:white;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            color:#2ecc71;
        }

        nav a{
            color:white;
            text-decoration:none;
        }

        .form-container{
            max-width:700px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.12);
        }

        .form-container input,
        .form-container textarea{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }

        .form-container textarea{
            height:120px;
            resize:none;
        }

    </style>

</head>

<body>

   <nav class="navbar">

    <h2>🏔️ HikeVerse</h2>

    <div>
        <a href="dashboard.html">Dashboard</a>
        <a href="treks.html">Treks</a>
        <a href="favorites.html">Favorites</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>

</nav>

    <h1 class="page-title">Add New Trek 🏔️</h1>

    <div class="form-container">

        <input type="text" id="trekName" placeholder="Trek Name">

        <input type="text" id="location" placeholder="Location">

        <input type="text" id="difficulty" placeholder="Difficulty">

        <textarea id="description" placeholder="Description"></textarea>

        <input type="text" id="imageUrl" placeholder="Image URL">

        <input type="text" id="distance" placeholder="Distance (e.g. 6 KM)">

        <input type="text" id="duration" placeholder="Duration (e.g. 4 Hours)">

        <input type="text" id="bestSeason" placeholder="Best Season">

        <textarea id="thingsToCarry" placeholder="Things To Carry"></textarea>

        <input type="text" id="emergencyContact" placeholder="Emergency Contact">

        <input type="text" id="mapLink" placeholder="Google Maps Link">

        <button class="btn btn-green" onclick="addTrek()">
            Add Trek
        </button>

    </div>

    <script src="script.js"></script>


</body>
</html>
