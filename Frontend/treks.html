<!DOCTYPE html>
<html>
<head>
    <title>All Treks - HikeVerse</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f7fa;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#2c3e50;
        }

        #searchInput{
            display:block;
            margin:0 auto 35px;
            width:350px;
            padding:14px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;
        }

        #trekContainer{
            display:flex;
            flex-wrap:wrap;
            gap:30px;
            justify-content:center;
        }

        .trek-card{
            width:320px;
            background:white;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 8px 25px rgba(0,0,0,0.12);
            cursor:pointer;
            transition:0.3s;
        }

        .trek-card:hover{
            transform:translateY(-8px);
        }

        .trek-card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .trek-card-content{
            padding:20px;
        }

        .trek-card-content h2{
            color:#2c3e50;
            margin-bottom:10px;
        }

        .trek-card-content p{
            margin-bottom:8px;
            color:#555;
        }
    </style>
</head>
<body>

    <h1>All Treks 🏔️</h1>

    <input
        type="text"
        id="searchInput"
        placeholder="Search Trek..."
        onkeyup="searchTreks()"
    >

    <div id="trekContainer"></div>

    <script src="script.js"></script>
    <script>
        loadTreks();
    </script>

</body>
</html>
