<!DOCTYPE html>
<html>
<head>
    <title>All Treks - HikeVerse</title>
    <style>
    body{
        font-family: Arial;
        background: #f4f4f4;
        padding: 30px;
    }

    h1{
        text-align: center;
    }

    #trekContainer{
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        justify-content: center;
    }

    .trek-card{
        width: 320px;
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .trek-card img{
        width: 100%;
        height: 220px;
        object-fit: cover;
    }

    .trek-card-content{
        padding: 20px;
    }
</style>
</head>
<body>

    <h1>All Treks 🏔️</h1>
    <input
    type="text"
    id="searchInput"
    placeholder="Search Trek..."
    onkeyup="searchTreks()">

    <div id="trekContainer"></div>

    <script src="script.js"></script>
    <script>
        loadTreks();
    </script>

</body>
</html>
