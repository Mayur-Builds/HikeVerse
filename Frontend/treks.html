<!DOCTYPE html>
<html>
<head>
    <title>All Treks - HikeVerse</title>

    <link rel="stylesheet" href="main.css">

    <style>
        .search-box{
            display:block;
            margin:0 auto 35px;
            width:350px;
            padding:14px;
            border:1px solid #ccc;
            border-radius:12px;
            font-size:16px;
        }

        #trekContainer{
            display:flex;
            flex-wrap:wrap;
            gap:30px;
            justify-content:center;
            padding:20px 40px 50px;
        }

      .trek-card{
    width:100%;
    max-width:320px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.12);
    cursor:pointer;
    transition:0.3s;
}  

        .trek-card:hover{
            transform:translateY(-8px);
        }

        .trek-card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .trek-card-content{
            padding:20px;
        }

        .trek-card-content h2{
            margin-bottom:10px;
        }

        .trek-card-content p{
            margin-bottom:8px;
            color:#555;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <h2>🏔️ HikeVerse</h2>

        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="add-trek.html">Add Trek</a>
            <a href="favorites.html">Favorites</a>
        </div>
    </nav>

    <h1 class="page-title">Explore Treks 🏔️</h1>

    <input
        class="search-box"
        type="text"
        id="searchInput"
        placeholder="Search trek by name..."
        onkeyup="searchTreks()"
    >

    <div id="trekContainer"></div>

    <script src="script.js"></script>
    <script>
        loadTreks();
    </script>


<footer>

    <p>🏔️ HikeVerse</p>

    <p>Discover, Plan and Explore Treks Across Maharashtra</p>

    <p>© 2026 HikeVerse | Built by Mayur</p>

</footer>
</body>
</html>
