<!DOCTYPE html>
<html>
<head>
    <title>My Favorites - HikeVerse</title>

    <link rel="stylesheet" href="main.css">

    <style>
        #favoriteContainer{
            display:flex;
            flex-wrap:wrap;
            gap:30px;
            justify-content:center;
            padding:20px 40px 50px;
        }

        .favorite-card{
            width:320px;
            background:white;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 8px 25px rgba(0,0,0,0.12);
            transition:0.3s;
        }

        .favorite-card:hover{
            transform:translateY(-8px);
        }

        .favorite-card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .favorite-card-content{
            padding:20px;
        }
    </style>
</head>

</html>
