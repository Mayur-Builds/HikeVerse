<html>
<head>
    <title>My Favorites - HikeVerse</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f7fa;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        #favoriteContainer{
            display:flex;
            flex-wrap:wrap;

            justify-content:center;

        .favorite-card img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .favorite-card-content{
            padding:15px;
        }
    </style>

</head>
