    <style>
      #favoriteContainer{
    display:flex;
    flex-wrap:wrap;
    gap:35px;
    justify-content:center;
    padding:40px 40px 60px;
}
.favorite-card{
    width:100%;
    max-width:340px;
    background:white;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    transition:0.35s ease;
    cursor:pointer;
}

      .favorite-card:hover{
    transform:translateY(-12px);
    box-shadow:0 25px 55px rgba(0,0,0,0.20);
}

.favorite-card img{
    width:100%;
    height:240px;
    object-fit:cover;
    transition:0.5s ease;
}

.favorite-card:hover img{
    transform:scale(1.08);
}

.favorite-card-content{
    padding:24px;
}

.favorite-card-content h2{
    margin-bottom:12px;
    color:#1f2d3d;
    font-size:24px;
}

.favorite-card-content p{
    color:#666;
    line-height:1.6;
    margin-bottom:10px;
}
    </style>
</head>
